    <main class="formulir">
        <h2>Testimoni- testimoni pembeli :</h2>
        <div id="daftarTestimoni">
        <button id="hapusSemua">Hapus Semua Testimoni</button></div>
        <section>
            <div id="daftarTestimoni"></div>
        </section>
    </main>
    <footer>
    <p>&copy; 2026 Toko Buku Lentera Ilmu</p>
</footer>
<script>
    const container =
    document.getElementById('daftarTestimoni');
    const testimoniList =
    JSON.parse(localStorage.getItem('testimoniList')) || [];

     if(testimoniList.length === 0) {
        container.innerHTML = "<p> Belum ada testimoni.</p>";
     } else {
        testimoniList.forEach((t, i)=> {
        const el = document.createElement('div');
        el.className = 'testimoni-box';
        el.innerHTML = `
         <p><strong>Nama:</strong> ${t.nama}</p>
         <p><strong>Asal:</strong> ${t.asal}</p>
         <p><strong>Email:</strong> ${t.email}</p>
         <p><strong>Judul buku yang dibeli:</strong> ${t.judul}</p>
         <p><strong>Rating:</strong> ${t.rating}</p>
         <p><strong>Pesan:</strong> ${t.pesan}</p>
         `;
         container.appendChild(el);
     });
     }
     document.getElementById("hapusSemua").addEventListener("click", function() {
        const konfirmasi = confirm("Apakah Anda yakin ingin menghapus semua testimoni?");
        if(konfirmasi) {
            localStorage.removeItem("testimoniList");
            location.reload();
        }
     });
</script>
</body>
</html>
<script>
    document.getElementById('formTestimoni').addEventListener('submit', function(e) {
    e.preventDefault();

    const nama = document.getElementById('nama').value;
    const asal = document.getElementById('asal').value;
    const email = document.getElementById('email').value;
    const judul = document.getElementById('judul').value;
    const rating = document.getElementById('rating').value;
    const pesan = document.getElementById('pesan').value;
    const dataBaru = {nama, asal, email, judul, rating, pesan};
    
    // Ambil list dari localStorage const testimoniList =
JSON.parse(localStorage.getItem('testimoniList')) || [];

   // Tambahkan testimoni baru testimoiList.push(dataBaru);

   // Simpan kembali ke localStorage localStorage.setItem('testimoniList', JSON.stringify(testimoniList));

   // Arahkan ke halaman konfirmasi window.location.href = 'proses-testimoni.html';
    });

</script>
